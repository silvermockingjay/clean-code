<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <link 
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
      rel="stylesheet"
    >
    <link 
      rel="stylesheet" 
      href="style.css" 
      media="screen" 
    >
  </head>
  <body class="page">
    <header class="header">
      <img class="header__image" src="./eisenhower-matrix.jpg" alt="The Eisenhower matrix">
      <a class="header__info-link" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </header>
    <main>
      <section class="section">
        <label for="task-new" class="section__heading section__heading_task-new">Add Item</label>
        <div class="section__form">
          <input id="task-new" class="section__input section__input_task-new" type="text">
          <button class="section__btn">Add</button>
        </div>
      </section>
      <section class="section">
        <h3 class="section__heading">Todo</h3>
        <ul class="section__list section__list_incomplete">
          <li class="section__list-item">
            <input type="checkbox" class="section__checkbox">
            <label class="section__task">Pay Bills</label>
            <input type="text" class="section__input section__input_save">
            <button class="section__btn section__btn_edit">Edit</button>
            <button class="section__btn section__btn_delete"><img class="section__delete-icon" src="./remove.svg" alt="delete task icon"></button>
          </li>
          <li class="section__list-item section__list-item_edit">
            <input type="checkbox" class="section__checkbox">
            <label class="section__task section__task_edit">Go Shopping</label>
            <input type="text" value="Go Shopping" class="section__input section__input_save section__input_edit">
            <button class="section__btn section__btn_edit">Save</button>
            <button class="section__btn section__btn_delete"><img class="section__delete-icon" src="./remove.svg" alt="delete task icon"></button>
          </li>
        </ul>
      </section> 
      <section class="section">
        <h3 class="section__heading">Completed</h3>
        <ul class="section__list section__list_complete">
          <li class="section__list-item">
            <input type="checkbox" class="section__checkbox" checked>
            <label class="section__task section__task_complete">See the Doctor</label>
            <input type="text" class="section__input section__input_save">
            <button class="section__btn section__btn_edit">Edit</button>
            <button class="section__btn section__btn_delete"><img class="section__delete-icon" src="./remove.svg" alt="delete task icon"></button>
          </li>
        </ul>
      </section> 
    </main>
    <script src="app.js"></script>
  </body>
</html>
